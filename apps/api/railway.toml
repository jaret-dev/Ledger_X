# Railway service configuration for apps/api.
# Railway's UI reads this when the service's root directory is set to apps/api.
# The managed Postgres plugin injects DATABASE_URL automatically.

[build]
builder = "NIXPACKS"
# Build from the monorepo root so pnpm workspaces and Turbo caching work.
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @ledger/db generate && pnpm build --filter @ledger/api"

[deploy]
# Apply pending Prisma migrations before the server comes up. Safe to re-run
# on every deploy — migrate deploy is a no-op when there's nothing pending.
startCommand = "pnpm --filter @ledger/db exec prisma migrate deploy && pnpm --filter @ledger/api start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

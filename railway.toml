# Railway service configuration for apps/api.
#
# This file lives at the repo ROOT (not apps/api). Railway's Root Directory
# setting on the service must be left empty/unset so the build context
# includes the whole pnpm workspace (pnpm-lock.yaml, pnpm-workspace.yaml,
# packages/db/, packages/shared-types/).
#
# We use a Dockerfile rather than Nixpacks/Railpack for monorepo
# determinism — auto-detection on pnpm workspaces is brittle.
#
# The managed Postgres plugin injects DATABASE_URL automatically.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Apply pending migrations on every deploy. The seed step from Phase 2
# was REMOVED here at the start of Phase 3 — mutations are landing, and
# user edits would otherwise reset on every push. Run the seed manually
# via `pnpm --filter @ledger/db seed` against a fresh DB if needed.
#
# A single `release` script wraps the chain (currently just migrate)
# so Railway's preDeployCommand exec doesn't lose subcommands the way
# a top-level `&&` did during Phase 2.
preDeployCommand = "pnpm --filter @ledger/db release"
healthcheckPath = "/api/health"
# Generous window — first boot on a cold Railway replica can be 30-60s after
# migrations are done. 300s is plenty and doesn't affect ongoing ops.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

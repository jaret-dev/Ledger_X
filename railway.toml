# Railway service configuration for apps/api.
#
# This file lives at the repo ROOT (not apps/api). Railway's Root Directory
# setting on the service must be left empty/unset so the build context
# includes the whole pnpm workspace (pnpm-lock.yaml, pnpm-workspace.yaml,
# packages/db/, packages/shared-types/).
#
# We use a Dockerfile rather than Nixpacks/Railpack for monorepo
# determinism — auto-detection on pnpm workspaces is brittle.
#
# The managed Postgres plugin injects DATABASE_URL automatically.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Apply pending migrations + (Phase 2 only) re-seed the canonical mock
# dataset on every deploy. Both are idempotent: migrate deploy is a no-op
# when nothing's pending, the seed uses findFirst-then-update-or-create.
# DISABLE the seed step at the start of Phase 3 when mutations land —
# user-edited rows would otherwise reset on the next deploy.
#
# The chain is wrapped in a single npm script so `&&` runs inside pnpm's
# shell — Railway's preDeployCommand exec's the first binary without a
# shell wrapper, so a top-level `&& ...` would silently drop the seed.
preDeployCommand = "pnpm --filter @ledger/db release"
healthcheckPath = "/api/health"
# Generous window — first boot on a cold Railway replica can be 30-60s after
# migrations are done. 300s is plenty and doesn't affect ongoing ops.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
